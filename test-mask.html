<!DOCTYPE html>
<html>
<head>
<style>
.preview-box {
  position: relative;
  width: 200px;
  height: 50px;
  background-color: rgba(0, 0, 0, 0.05);
  border-radius: 8px;
  margin: 50px;
}
.masked-border {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 8px;
  border: 1.5px solid rgba(0, 0, 0, 0.3);
  -webkit-mask-image: linear-gradient(to right, black 0px, black 10px, transparent 32px, transparent calc(100% - 32px), black calc(100% - 10px), black 100%);
  mask-image: linear-gradient(to right, black 0px, black 10px, transparent 32px, transparent calc(100% - 32px), black calc(100% - 10px), black 100%);
}
</style>
</head>
<body>
<div class="preview-box">
  <div class="masked-border"></div>
</div>
</body>
</html>
